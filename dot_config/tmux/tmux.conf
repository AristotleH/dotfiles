# ==========================================================================
# tmux configuration — comfortable defaults with standard terminal feel
# ==========================================================================

# --- Terminal & Color ---
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-256color:RGB"
set -ga terminal-features ",xterm-ghostty:RGB"

# Pass through OSC sequences (CWD reporting, clipboard, images, etc.)
set -g allow-passthrough on
set -ga terminal-overrides ",xterm*:Ms=\\E]52;c;%p2%s\\7"

# --- Core Behavior ---
# No delay after Escape (critical for vim/editor users)
set -s escape-time 0

# Effectively infinite scrollback
set -g history-limit 999999999

# Enable focus events (lets editors detect when you switch panes)
set -g focus-events on

# Display messages a bit longer
set -g display-time 2000
set -g display-panes-time 2000

# More responsive but relaxed repeat timeout
set -g repeat-time 600

# Mouse support — scroll, click, resize, select all work naturally
set -g mouse on

# --- Clipboard ---
# Use system clipboard via OSC 52 (works in iTerm2 and Ghostty)
set -g set-clipboard on

# --- Window & Pane Numbering ---
# Start at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# Keep numbering tidy when windows close
set -g renumber-windows on

# Only constrain window size when a smaller client is actively looking at it
setw -g aggressive-resize on

# --- Key Bindings ---

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Intuitive splits — keep working directory
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows keep working directory
bind c new-window -c "#{pane_current_path}"

# Pane navigation — Alt+Arrow, vim-aware (no prefix needed)
# If the pane is running vim/nvim, send the key through; otherwise switch pane
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n M-Left  if-shell "$is_vim" "send-keys M-Left"  "select-pane -L"
bind -n M-Right if-shell "$is_vim" "send-keys M-Right" "select-pane -R"
bind -n M-Up    if-shell "$is_vim" "send-keys M-Up"    "select-pane -U"
bind -n M-Down  if-shell "$is_vim" "send-keys M-Down"  "select-pane -D"

# Window navigation — Shift+Arrow (no prefix needed)
bind -n S-Left previous-window
bind -n S-Right next-window

# Jump to window by number (prefix + number is default, but also allow no-prefix)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Pane resizing — prefix + Ctrl+Arrow (repeatable)
bind -r C-Left resize-pane -L 2
bind -r C-Right resize-pane -R 2
bind -r C-Up resize-pane -U 2
bind -r C-Down resize-pane -D 2

# Session management
bind S choose-session
bind N command-prompt -p "New session:" "new-session -s '%%'"

# Quick window swap
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Detach all other clients (fix stale session shrinking your viewport)
bind D detach-client -a

# Toggle zoom with prefix-z (default, but worth knowing)
# Break pane to its own window
bind ! break-pane

# --- Copy Mode ---
# Vi-style keys in copy mode (feels natural, works with mouse too)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# Enter copy mode with prefix-[ (default) or prefix-v
bind v copy-mode

# --- Session Cleanup ---
# Destroy sessions when the last client detaches (no lingering after tab close)
set -g destroy-unattached on

# --- Activity ---
# Subtle notification when something happens in another window
set -g monitor-activity on
set -g visual-activity off

# --- Status Bar ---
# Clean, minimal — stays out of your way
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=brightblack"

# Left: session name
set -g status-left "#[fg=blue,bold]#S#[nobold,fg=brightblack] │ "
set -g status-left-length 20

# Right: day + date + time
set -g status-right "#[fg=brightblack]%a %d %b  %H:%M"
set -g status-right-length 25

# Window tabs
setw -g window-status-format " #I "
setw -g window-status-current-format " #I "
setw -g automatic-rename off
setw -g allow-rename off
setw -g window-status-current-style "fg=cyan,bold"
setw -g window-status-activity-style "fg=yellow"
setw -g window-status-separator ""

# --- Pane Borders ---
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g pane-border-lines single

# --- Messages & Menus ---
set -g message-style "bg=default,fg=yellow,bold"
set -g mode-style "bg=blue,fg=black"
