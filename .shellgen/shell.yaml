# Shell Configuration Manifest
#
# Single source of truth for cross-shell functions and modules.
# Run `generate_shell.py` (or `make generate`) to produce
# Fish, Zsh, Bash, and PowerShell files from this manifest.
#
# -------------------------------------------------------------------------
# Quick Reference
# -------------------------------------------------------------------------
#
# Functions:
#   Predicate (one-liner OS/arch check):
#     - name: is-darwin
#       description: Check if running on macOS
#       predicate: os_is_darwin       # see PREDICATES in generate_shell.py
#
#   Complex (shell-specific bodies):
#     - name: my_func
#       description: Does something
#       body:
#         fish: |
#           echo hello
#         posix: |                    # shared fallback for zsh + bash
#           echo hello
#         pwsh: |
#           Write-Output hello
#         # or use 'shared:' as a fallback for all shells
#         # or use a string shorthand: body: "echo hello"
#
# Modules:
#   PATH:
#     - name: path
#       prefix: "00"
#       description: PATH additions
#       paths:
#         - "$HOME/.local/bin"
#
#   Aliases (guard + alias list):
#     - name: eza
#       prefix: "40"
#       description: Modern ls replacement
#       guard: { command_exists: eza }
#       aliases:
#         ls: "eza"
#
#   Environment variables:
#     - name: editor
#       prefix: "05"
#       description: Default editor
#       env:
#         EDITOR: vim
#
#   Tool init (guard + tool init shell | source):
#     - name: zoxide
#       prefix: "50"
#       description: Zoxide
#       guard: { command_exists: zoxide }
#       tool: zoxide
#
#   Eval command (run command and source output):
#     - name: mise
#       prefix: "50"
#       description: mise
#       guard: { command_exists: mise }
#       eval_command: "mise activate {shell}"
#
#   Source file (source another file if it exists):
#     - name: local
#       prefix: "99"
#       description: Local overrides
#       source_file: "$HOME/.shellrc.local"
#
#   Conditional (if/elif/else with guards):
#     - name: editor-setup
#       prefix: "05"
#       description: Editor configuration
#       conditional:
#         - if: { command_exists: nvim }
#           env: { EDITOR: nvim, VISUAL: nvim }
#         - elif: { command_exists: vim }
#           env: { EDITOR: vim, VISUAL: vim }
#         - else:
#           env: { EDITOR: vi, VISUAL: vi }
#
#   Custom (guards + body):
#     - name: tmux
#       prefix: "70"
#       description: Tmux auto-attach
#       guards:
#         - { command_exists: tmux }
#         - is_interactive
#       body:
#         shared: |
#           tmux attach 2>/dev/null || tmux new-session
#
# Guards (singular `guard:` or list `guards:`):
#   { command_exists: <cmd> }
#   { env_not_set: <VAR> }
#   { env_set: <VAR> }
#   { env_equals: { var: <VAR>, value: <VAL> } }
#   { not_env_equals: { var: <VAR>, value: <VAL> } }
#   { file_exists: <path> }
#   { dir_exists: <path> }
#   { not: <any-guard> }
#   { all: [<guard>, <guard>, ...] }  # logical AND composition
#   { any: [<guard>, <guard>, ...] }  # logical OR composition
#   is_tty
#   is_interactive
# -------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Functions
# ---------------------------------------------------------------------------
functions:
  # Predicate functions — one-liner OS checks
  - name: is-darwin
    description: Check if running on macOS
    predicate: os_is_darwin

  - name: is-linux
    description: Check if running on Linux
    predicate: os_is_linux

  # Complex functions — shell-specific bodies
  - name: in_dir
    description: Run a command in a different directory and return to the original
    usage: "in_dir <directory> <command> [args...]"
    body:
      fish: |
        if test (count $argv) -lt 2
            echo "Usage: in_dir <directory> <command> [args...]" >&2
            return 1
        end

        set -l target_dir $argv[1]
        set -l original_dir $PWD

        if not cd $target_dir 2>/dev/null
            echo "in_dir: cannot access directory: $target_dir" >&2
            return 1
        end

        # Run the command (from argv[2] onwards)
        $argv[2..]
        set -l exit_code $status

        cd $original_dir
        return $exit_code
      posix: |
        if [[ $# -lt 2 ]]; then
            echo "Usage: in_dir <directory> <command> [args...]" >&2
            return 1
        fi

        local target_dir="$1"
        shift
        local original_dir="$PWD"

        if ! cd "$target_dir" 2>/dev/null; then
            echo "in_dir: cannot access directory: $target_dir" >&2
            return 1
        fi

        "$@"
        local exit_code=$?

        cd "$original_dir"
        return $exit_code
      pwsh: |
        param(
            [Parameter(Mandatory)][string]$Directory,
            [Parameter(Mandatory)][string]$Command,
            [Parameter(ValueFromRemainingArguments)][string[]]$Arguments = @()
        )
        if (-not (Test-Path $Directory)) {
            Write-Error "in_dir: cannot access directory: $Directory"
            return
        }
        $originalDir = Get-Location
        try {
            Set-Location $Directory
            & $Command @Arguments
        } finally {
            Set-Location $originalDir
        }

# ---------------------------------------------------------------------------
# Modules
# ---------------------------------------------------------------------------
modules:
  # PATH additions
  - name: path
    prefix: "00"
    description: PATH additions
    paths:
      - "$HOME/.local/bin"

  # Aliases module — identical aliases across shells
  - name: eza
    prefix: "40"
    description: Modern ls replacement using eza
    url: https://github.com/eza-community/eza
    guard: { command_exists: eza }
    aliases:
      ls: "eza"
      ll: "eza -l"
      la: "eza -la"
      lt: "eza --tree"

  # Tool init — `tool init shell | source` pattern
  - name: zoxide
    prefix: "50"
    description: "Zoxide - smarter cd command"
    comment: "Usage: z <partial-path> to jump to frequently used directories"
    guard: { command_exists: zoxide }
    tool: zoxide

  # Custom module — declarative guards + body
  - name: tmux
    prefix: "70"
    description: Tmux auto-attach/start
    comment: Set TMUX_AUTO_ATTACH=1 to enable
    guards:
      - { command_exists: tmux }
      - { env_equals: { var: TMUX_AUTO_ATTACH, value: "1" } }
      - is_tty
      - { env_not_set: TMUX }
      - { not_env_equals: { var: TERM_PROGRAM, value: vscode } }
      - is_interactive
    body: "tmux attach 2>/dev/null || tmux new-session"

  - name: prompt
    prefix: "80"
    description: Interactive shell prompt
    comment: Bash and PowerShell get a status-aware prompt with git branch
    guard: is_interactive
    skip_shells: [fish, zsh]
    body:
      bash: |
        if [[ -n "${__DOT_PROMPT_INITIALIZED:-}" ]]; then
            return 0
        fi
        __DOT_PROMPT_INITIALIZED=1

        # ANSI colors wrapped in \[...\] so bash measures width correctly
        __dc_reset='\[\e[0m\]'
        __dc_brcyan='\[\e[96m\]'
        __dc_brmag='\[\e[95m\]'
        __dc_cyan='\[\e[36m\]'
        __dc_brgrn='\[\e[92m\]'
        __dc_brylw='\[\e[93m\]'
        __dc_brred='\[\e[91m\]'
        __dc_brblu='\[\e[94m\]'

        __dot_prompt_cache_dir="${XDG_CACHE_HOME:-$HOME/.cache}/dot_prompt"

        __dot_prompt_parts_length() {
            local total=0 part
            for part in "$@"; do
                (( total += ${#part} ))
            done
            (( $# > 1 )) && (( total += $# - 1 ))
            printf '%s' "$total"
        }

        __dot_prompt_truncate_tail() {
            local text="$1"
            local keep="$2"
            if (( keep <= 1 )); then
                printf '…'
                return
            fi
            local tail_len=$(( keep - 1 ))
            printf '…%s' "${text: -tail_len}"
        }

        __dot_prompt_pwd() {
            local cwd="${PWD/#$HOME/~}"
            local cols="${COLUMNS:-80}"
            local budget=$(( cols - 12 ))
            (( budget < 10 )) && budget=10

            local parts display_parts
            IFS='/' read -ra parts <<< "$cwd"
            display_parts=("${parts[@]}")
            local n=${#display_parts[@]}
            local length i part other keep first
            length="$(__dot_prompt_parts_length "${display_parts[@]}")"

            for (( i=1; i<n-1 && length>budget; i++ )); do
                part="${display_parts[$i]}"
                if [[ -n "$part" && ${#part} -gt 1 ]]; then
                    display_parts[$i]="${part:0:1}"
                    length="$(__dot_prompt_parts_length "${display_parts[@]}")"
                fi
            done

            if (( length > budget && n > 2 )); then
                local compact_parts=() tail_parts candidate_parts start=0
                if [[ "${display_parts[0]}" == '' || "${display_parts[0]}" == '~' ]]; then
                    compact_parts=("${display_parts[0]}")
                    start=1
                fi

                tail_parts=("${display_parts[$((n-1))]}")
                for (( i=n-2; i>=start; i-- )); do
                    candidate_parts=("${compact_parts[@]}" '…' "${display_parts[$i]}" "${tail_parts[@]}")
                    if (( $(__dot_prompt_parts_length "${candidate_parts[@]}") > budget )); then
                        break
                    fi
                    tail_parts=("${display_parts[$i]}" "${tail_parts[@]}")
                done

                display_parts=("${compact_parts[@]}" '…' "${tail_parts[@]}")
                n=${#display_parts[@]}
                length="$(__dot_prompt_parts_length "${display_parts[@]}")"
            fi

            if (( length > budget && n > 0 )); then
                other=0
                if (( n > 1 )); then
                    other="$(__dot_prompt_parts_length "${display_parts[@]:0:n-1}")"
                fi
                keep=$(( budget - other - 1 ))
                (( keep < 1 )) && keep=1
                display_parts[$((n-1))]="$(__dot_prompt_truncate_tail "${display_parts[$((n-1))]}" "$keep")"
            fi

            local out='' sep='' seg
            for (( i=0; i<n; i++ )); do
                part="${display_parts[$i]}"
                if (( i == 0 || i == n - 1 )); then
                    seg="${__dc_brcyan}${part}${__dc_reset}"
                elif [[ -z "$part" ]]; then
                    seg=''
                elif [[ "$part" == '…' || ${#part} -le 1 ]]; then
                    seg="${__dc_brmag}${part}${__dc_reset}"
                else
                    seg="${__dc_brcyan}${part}${__dc_reset}"
                fi
                out+="${sep}${seg}"
                sep="${__dc_cyan}/${__dc_reset}"
            done
            printf '%s' "$out"
        }

        __dot_prompt_git_root() {
            local dir="$PWD"
            while :; do
                if [[ -e "$dir/.git" ]]; then
                    printf '%s' "$dir"
                    return 0
                fi
                [[ "$dir" == / ]] && return 1
                dir="${dir%/*}"
                [[ -n "$dir" ]] || dir='/'
            done
        }

        __dot_prompt_git_cache_key() {
            local key="$1"
            key="${key//[^[:alnum:]_.-]/_}"
            printf '%s' "$key"
        }

        __dot_prompt_git_build() {
            local repo="$1"
            local branch
            branch="$(git -C "$repo" branch --show-current 2>/dev/null)" || return
            if [[ -z "$branch" ]]; then
                branch="$(git -C "$repo" tag --points-at HEAD 2>/dev/null | head -1)"
                if [[ -n "$branch" ]]; then
                    branch="#${branch}"
                else
                    branch="@$(git -C "$repo" rev-parse --short HEAD 2>/dev/null)"
                fi
            fi
            (( ${#branch} > 24 )) && branch="${branch:0:21}..."

            local stat staged=0 dirty=0 untracked=0 conflicted=0 stash=0
            stat="$(git -C "$repo" --no-optional-locks status --porcelain 2>/dev/null)"
            while IFS= read -r line; do
                [[ "$line" =~ ^[ADMR] ]] && (( staged++ ))
                [[ "$line" =~ ^.[ADMR] ]] && (( dirty++ ))
                [[ "$line" =~ ^\?\? ]] && (( untracked++ ))
                [[ "$line" =~ ^UU ]] && (( conflicted++ ))
            done <<< "$stat"
            stash="$(git -C "$repo" stash list 2>/dev/null | wc -l | tr -d ' ')"

            local behind=0 ahead=0 upstream
            upstream="$(git -C "$repo" rev-list --count --left-right                 @{upstream}...HEAD 2>/dev/null)"
            if [[ -n "$upstream" ]]; then
                behind="${upstream%%$'	'*}"
                ahead="${upstream##*$'	'}"
            fi

            local color="${__dc_brgrn}"
            (( conflicted > 0 )) && color="${__dc_brred}"
            (( staged > 0 || dirty > 0 || untracked > 0 )) && color="${__dc_brylw}"

            printf '%s%s%s' "$color" "$branch" "${__dc_reset}"
            (( behind     > 0 )) && printf ' %s⇣%d%s' "${__dc_brgrn}" "$behind"    "${__dc_reset}"
            (( ahead      > 0 )) && printf ' %s⇡%d%s' "${__dc_brgrn}" "$ahead"     "${__dc_reset}"
            (( stash      > 0 )) && printf ' %s*%d%s' "${__dc_brgrn}" "$stash"     "${__dc_reset}"
            (( conflicted > 0 )) && printf ' %s~%d%s' "${__dc_brred}" "$conflicted" "${__dc_reset}"
            (( staged     > 0 )) && printf ' %s+%d%s' "${__dc_brylw}" "$staged"    "${__dc_reset}"
            (( dirty      > 0 )) && printf ' %s!%d%s' "${__dc_brylw}" "$dirty"     "${__dc_reset}"
            (( untracked  > 0 )) && printf ' %s?%d%s' "${__dc_brblu}" "$untracked" "${__dc_reset}"
            return 0
        }

        __dot_prompt_git_refresh_async() {
            local repo="$1"
            local key cache lock
            key="$(__dot_prompt_git_cache_key "$repo")"
            cache="$__dot_prompt_cache_dir/$key.git"
            lock="$cache.lock"

            mkdir -p "$__dot_prompt_cache_dir"
            if ! mkdir "$lock" 2>/dev/null; then
                return
            fi

            (
                local tmp="$cache.tmp"
                __dot_prompt_git_build "$repo" > "$tmp" && mv "$tmp" "$cache"
                rmdir "$lock"
            ) </dev/null >/dev/null 2>&1 &
        }

        __dot_prompt_git() {
            command -v git &>/dev/null || return
            local repo key cache git_segment=''
            repo="$(__dot_prompt_git_root)" || return
            key="$(__dot_prompt_git_cache_key "$repo")"
            cache="$__dot_prompt_cache_dir/$key.git"

            __dot_prompt_git_refresh_async "$repo"
            [[ -f "$cache" ]] && IFS= read -r git_segment < "$cache"
            printf '%s' "$git_segment"
        }

        __dot_prompt_precmd() {
            local last=$?
            local arrow_color="${__dc_brgrn}"
            local git_segment
            (( last != 0 )) && arrow_color="${__dc_brred}"
            git_segment="$(__dot_prompt_git)"
            [[ -n "$git_segment" ]] && git_segment=" ${git_segment}"
            PS1="$(__dot_prompt_pwd)${git_segment} ${arrow_color}❯${__dc_reset} "
        }

        if [[ -n "${PROMPT_COMMAND:-}" ]]; then
            PROMPT_COMMAND="__dot_prompt_precmd; ${PROMPT_COMMAND}"
        else
            PROMPT_COMMAND="__dot_prompt_precmd"
        fi
      pwsh: |
        if ($global:__DotPromptInitialized) { return }
        $global:__DotPromptInitialized = $true

        if (Get-Variable PSStyle -Scope Global -ErrorAction SilentlyContinue) {
            $global:__dc_reset  = $PSStyle.Reset
            $global:__dc_brcyan = $PSStyle.Foreground.BrightCyan
            $global:__dc_brmag  = $PSStyle.Foreground.BrightMagenta
            $global:__dc_cyan   = $PSStyle.Foreground.Cyan
            $global:__dc_brgrn  = $PSStyle.Foreground.BrightGreen
            $global:__dc_brylw  = $PSStyle.Foreground.BrightYellow
            $global:__dc_brred  = $PSStyle.Foreground.BrightRed
            $global:__dc_brblu  = $PSStyle.Foreground.BrightBlue
        } else {
            $global:__dc_reset = $global:__dc_brcyan = $global:__dc_brmag = ""
            $global:__dc_cyan  = $global:__dc_brgrn  = $global:__dc_brylw = ""
            $global:__dc_brred = $global:__dc_brblu  = ""
        }

        function global:__DotPromptPartsLength {
            param([string[]]$Parts)
            $total = 0
            foreach ($part in $Parts) { $total += $part.Length }
            if ($Parts.Count -gt 1) { $total += $Parts.Count - 1 }
            return $total
        }

        function global:__DotPromptTruncateTail {
            param([string]$Text, [int]$Keep)
            if ($Keep -le 1) { return "…" }
            $tailLength = $Keep - 1
            if ($tailLength -ge $Text.Length) { return $Text }
            return "…" + $Text.Substring($Text.Length - $tailLength)
        }

        function global:__DotPromptPwd {
            $cwd = $executionContext.SessionState.Path.CurrentLocation.Path
            if ($cwd.StartsWith($HOME)) { $cwd = "~" + $cwd.Substring($HOME.Length) }
            $parts = @($cwd -split '[\\/]')
            $displayParts = @($parts)
            $n = $displayParts.Count
            $budget = [Math]::Max(10, $Host.UI.RawUI.WindowSize.Width - 12)
            $length = __DotPromptPartsLength $displayParts

            for ($i = 1; $i -lt $n - 1 -and $length -gt $budget; $i++) {
                $part = $displayParts[$i]
                if ($part.Length -gt 1) {
                    $displayParts[$i] = $part.Substring(0, 1)
                    $length = __DotPromptPartsLength $displayParts
                }
            }

            if ($length -gt $budget -and $n -gt 2) {
                $compactParts = @()
                $start = 0
                if ($displayParts[0] -eq '' -or $displayParts[0] -eq '~') {
                    $compactParts = @($displayParts[0])
                    $start = 1
                }

                $tailParts = @($displayParts[$n - 1])
                for ($i = $n - 2; $i -ge $start; $i--) {
                    $candidateParts = @($compactParts + @('…') + @($displayParts[$i]) + $tailParts)
                    if ((__DotPromptPartsLength $candidateParts) -gt $budget) {
                        break
                    }
                    $tailParts = @($displayParts[$i]) + $tailParts
                }

                $displayParts = @($compactParts + @('…') + $tailParts)
                $n = $displayParts.Count
                $length = __DotPromptPartsLength $displayParts
            }

            if ($length -gt $budget -and $n -gt 0) {
                $other = if ($n -gt 1) {
                    __DotPromptPartsLength $displayParts[0..($n - 2)]
                } else {
                    0
                }
                $keep = [Math]::Max(1, $budget - $other - 1)
                $displayParts[$n - 1] = __DotPromptTruncateTail $displayParts[$n - 1] $keep
            }

            $out = [System.Text.StringBuilder]::new()
            for ($i = 0; $i -lt $n; $i++) {
                $p = $displayParts[$i]
                if ($i -gt 0) {
                    [void]$out.Append("$($global:__dc_cyan)/$($global:__dc_reset)")
                }
                if ($i -eq 0 -or $i -eq $n - 1) {
                    [void]$out.Append("$($global:__dc_brcyan)$p$($global:__dc_reset)")
                } elseif ($p -eq '') {
                    # skip empty
                } elseif ($p -eq '…' -or $p.Length -le 1) {
                    [void]$out.Append("$($global:__dc_brmag)$p$($global:__dc_reset)")
                } else {
                    [void]$out.Append("$($global:__dc_brcyan)$p$($global:__dc_reset)")
                }
            }
            return $out.ToString()
        }

        function global:__DotPromptGit {
            if (-not (Get-Command git -ErrorAction SilentlyContinue)) { return "" }
            $branch = git branch --show-current 2>$null
            if (-not $branch) {
                $tag = git tag --points-at HEAD 2>$null | Select-Object -First 1
                if ($tag) { $branch = "#$tag" }
                else { $branch = "@$(git rev-parse --short HEAD 2>$null)" }
            }
            if ($branch.Length -gt 24) { $branch = $branch.Substring(0, 21) + "..." }
            $stat = git --no-optional-locks status --porcelain 2>$null
            $staged    = @($stat | Where-Object { $_ -match '^[ADMR]' }).Count
            $dirty     = @($stat | Where-Object { $_ -match '^.[ADMR]' }).Count
            $untracked = @($stat | Where-Object { $_ -match '^\?\?' }).Count
            $color = $global:__dc_brgrn
            if ($staged -gt 0 -or $dirty -gt 0 -or $untracked -gt 0) { $color = $global:__dc_brylw }
            $out = " $color$branch$($global:__dc_reset)"
            if ($staged     -gt 0) { $out += " $($global:__dc_brylw)+$staged$($global:__dc_reset)" }
            if ($dirty      -gt 0) { $out += " $($global:__dc_brylw)!$dirty$($global:__dc_reset)" }
            if ($untracked  -gt 0) { $out += " $($global:__dc_brblu)?$untracked$($global:__dc_reset)" }
            return $out
        }

        function global:prompt {
            $last = $LASTEXITCODE
            $arrowColor = if ($last -ne 0) { $global:__dc_brred } else { $global:__dc_brgrn }
            $pwd = __DotPromptPwd
            $git = __DotPromptGit
            return "$pwd$git $arrowColor`u{276F}$($global:__dc_reset) "
        }
