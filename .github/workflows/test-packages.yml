name: Package Management Tests

on:
  push:
    paths:
      - '.pkgmgmt/**'
      - '.chezmoiscripts/**'
  pull_request:
    paths:
      - '.pkgmgmt/**'
      - '.chezmoiscripts/**'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run unit tests
        run: python3 .pkgmgmt/tests/test_generator.py

  integration-test-debian:
    name: Integration Test (Debian)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .pkgmgmt/test-environments
          file: .pkgmgmt/test-environments/Dockerfile.debian
          tags: chezmoi-test-debian:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Test chezmoi initialization
        run: |
          docker run --rm \
            -v "$PWD:/dotfiles-src:ro" \
            chezmoi-test-debian:latest \
            bash -c 'set -e
              echo "Copying dotfiles repository..."
              cp -r /dotfiles-src /tmp/dotfiles
              echo "Pre-configuring chezmoi..."
              mkdir -p ~/.config/chezmoi
              cat > ~/.config/chezmoi/chezmoi.toml << "CFGEOF"
          [data.git]
            email = "test@example.com"
            name = "Test User"
            extraConfigs = ""
          [data.packages]
            manifestPath = ""
          [data.shell]
            extraManifests = ""
          CFGEOF
              echo "Initializing chezmoi..."
              chezmoi init --source=/tmp/dotfiles --apply --force
              echo "Checking chezmoi status..."
              chezmoi --source=/tmp/dotfiles status || true
              echo "Chezmoi initialization successful!"'
